name: Lab

on:
  workflow_dispatch:
    inputs:
      platform:
        type: choice
        required: true
        description: Which platform to start a lab instance on
        options:
          - e2e
          - linux
          - windows
          - windows-wsl2
          - macos-intel
          - macos-apple-silicon

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: "true"
      - uses: ./.github/actions/build

  e2e-lab:
    if: github.event.inputs.platform == 'e2e'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/e2e
      - uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113 # v3
        if: ${{ always() }}

  linux-lab:
    if: github.event.inputs.platform == 'linux'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [build]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/linux
      - uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113 # v3
        if: ${{ always() }}

  macos-intel-lab:
    if: github.event.inputs.platform == 'macos-intel'
    runs-on: macos-15-intel
    timeout-minutes: 60
    needs: [build]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/mac-intel
      - uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113 # v3
        if: ${{ always() }}

  macos-apple-silicon-lab:
    if: github.event.inputs.platform == 'macos-apple-silicon'
    runs-on: macos-26
    timeout-minutes: 60
    needs: [build]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/mac-apple-silicon
      - uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113 # v3
        if: ${{ always() }}

  windows-lab:
    if: github.event.inputs.platform == 'windows'
    runs-on: windows-latest
    timeout-minutes: 60
    needs: [build]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/windows
      - uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113 # v3
        if: ${{ always() }}

  windows-wsl2-lab:
    if: github.event.inputs.platform == 'windows-wsl2'
    runs-on: windows-latest
    timeout-minutes: 60
    needs: [build]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/windows-wsl2
      - uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113 # v3
        if: ${{ always() }}
